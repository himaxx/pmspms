<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ketan PMS — Offline</title>
  <style>
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #0f172a; /* Midnight blue to match app theme */
      color: white;
      text-align: center;
      padding: 2rem;
    }
    .container {
      max-width: 400px;
      background: rgba(255, 255, 255, 0.05);
      padding: 3rem;
      border-radius: 2.5rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 900;
      margin: 0 0 1rem;
      letter-spacing: -0.025em;
    }
    p {
      color: #94a3b8;
      font-size: 0.875rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 2rem;
      border-radius: 1.5rem;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
    }
    button {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 1rem;
      font-weight: 700;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      background: #4338ca;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/ketan_logo.png" alt="Ketan Logo" class="logo" />
    <h1>You're Offline</h1>
    <p>It looks like you've lost your connection. Ketan PMS needs internet to sync your production data.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
